name: bootstrap-ci

on:
  push:
  pull_request:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu
      - name: Build bootstrap kernel
        run: make ARCH=x86_64 TARGET=x86_64-linux-gnu kernel

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install analysis deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            cppcheck \
            clang-tidy \
            bear
      - name: Run static analysis
        run: bash scripts/ci/static-analysis.sh

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install coverage deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc lcov
      - name: Run coverage pipeline
        run: bash scripts/ci/coverage.sh
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: build/coverage/coverage.filtered.info
